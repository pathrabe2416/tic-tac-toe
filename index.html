<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIC×TAC</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:     #060608;
  --o:      #00ffc8;
  --o-glow: rgba(0,255,200,0.35);
  --x:      #ff3e5e;
  --x-glow: rgba(255,62,94,0.35);
  --text:   #f0f0f8;
  --muted:  rgba(240,240,248,0.38);
  --border: rgba(255,255,255,0.07);
  --grid:   rgba(255,255,255,0.035);
}

/* KEY FIX: html/body must NOT have overflow:hidden — let them scroll naturally */
html {
  height: 100%;
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* REMOVED: overflow: hidden — this was blocking all scrolling */
  /* justify-content: center removed so page can grow naturally */
  padding: 60px 20px;
}

/* ── Background — fixed so it stays behind while you scroll ── */
.bg {
  position: fixed;   /* fixed, not absolute — stays in viewport always */
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridDrift 25s linear infinite;
}
@keyframes gridDrift { to { transform: translateY(60px); } }

.bg-blobs {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 65% 55% at 15% 20%, rgba(0,255,200,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 55% 50% at 85% 80%, rgba(255,62,94,0.07) 0%, transparent 65%);
}
.bg-scan {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom, transparent 0px, transparent 3px,
    rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px
  );
}
.bg-vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 90% 90% at 50% 50%, transparent 30%, rgba(6,6,8,0.85) 100%);
}

/* ── Cursor glow ── */
.cursor-glow {
  position: fixed;
  width: 340px; height: 340px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,255,200,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transform: translate(-50%, -50%);
  transition: background 0.3s ease;
}

/* ── Main card ── */
.card {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  width: 100%;
  max-width: 900px;
  /* Center vertically on tall screens, just stack naturally on small ones */
  margin: auto;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Title ── */
.title {
  font-family: 'Black Ops One', cursive;
  font-size: clamp(64px, 15vw, 180px);
  line-height: 0.88;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 48px;
}
.title .l1 { display: block; color: var(--text); }
.title .l2 {
  display: block; color: transparent;
  -webkit-text-stroke: 2px var(--o);
  filter: drop-shadow(0 0 28px var(--o-glow));
}
.title .l3 {
  display: block; color: var(--x);
  font-size: 0.5em; letter-spacing: 0.12em;
  filter: drop-shadow(0 0 20px var(--x-glow));
}

/* ── Mode buttons ── */
.mode-toggle {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.mode-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  padding: 18px 38px;
  border-radius: 14px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1.5px solid var(--border);
  cursor: pointer;
  background: rgba(255,255,255,0.03);
  color: var(--muted);
  transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.3s ease, background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
  position: relative;
  overflow: hidden;
}

.mode-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  pointer-events: none;
}

.mode-btn.ai:hover {
  background: rgba(0,255,200,0.08);
  border-color: var(--o);
  color: var(--o);
  box-shadow: 0 8px 40px rgba(0,255,200,0.25);
  transform: translateY(-5px);
}

.mode-btn.p2:hover {
  background: rgba(255,62,94,0.08);
  border-color: var(--x);
  color: var(--x);
  box-shadow: 0 8px 40px rgba(255,62,94,0.25);
  transform: translateY(-5px);
}

.mode-btn:active { transform: translateY(-2px) scale(0.98); }

.mode-icon { font-size: 18px; line-height: 1; }

/* ── Footer tag ── */
.tag {
  margin-top: 40px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}
.tag span { color: var(--o); }

/* ── Anchor reset so the <a> doesn't add weirdness ── */
a { text-decoration: none; display: inline-block; }

/* ── Responsive ── */
@media (max-width: 480px) {
  body { padding: 40px 16px; }
  .mode-toggle { flex-direction: column; align-items: center; }
  .mode-btn { width: 260px; justify-content: center; }
  .title { margin-bottom: 36px; }
}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-grid"></div>
  <div class="bg-blobs"></div>
  <div class="bg-scan"></div>
  <div class="bg-vignette"></div>
</div>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="card">

  <h1 class="title">
    <span class="l1">TIC</span>
    <span class="l2">×TAC</span>
    <span class="l3">TOE</span>
  </h1>

  <div class="mode-toggle">
    <a href="aimode.html">
      <button class="mode-btn ai">
        <span class="mode-icon">🤖</span> vs AI
      </button>
    </a>

    <a href="pvp.html">
      <button class="mode-btn p2">
        <span class="mode-icon">👥</span> vs Player
      </button>
    </a>
  </div>

  <div class="tag">TIC<span>×</span>TAC — Pure HTML · CSS · JS</div>

</div>

<script>
// Cursor glow
const g = document.getElementById('cursorGlow');
let mx = innerWidth / 2, my = innerHeight / 2, gx = mx, gy = my;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
(function tick() {
  gx += (mx - gx) * 0.09;
  gy += (my - gy) * 0.09;
  g.style.left = gx + 'px';
  g.style.top  = gy + 'px';
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
